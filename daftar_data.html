<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status & Analisa Material (Mobile Responsive)</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 10px;
            color: #000;
        }

        .worksheet-container {
            width: 100%;
            max-width: 900px;
            background-color: #fff;
            margin: 0 auto;
            padding: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border: 1px solid #000;
            box-sizing: border-box;
        }

        /* Responsive Table */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            min-width: 600px; /* Menjamin tabel tidak terlalu gepeng di mobile */
        }

        th, td {
            border: 1px solid #000;
            padding: 6px;
            vertical-align: middle;
        }

        input, select, textarea {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            font-family: Arial, sans-serif;
            font-size: 12px;
            padding: 4px 0;
            color: #000;
            box-sizing: border-box;
        }

        .btn-action { background-color: #eee; border: 1px solid #777; padding: 5px 8px; cursor: pointer; border-radius: 3px; font-size: 10px; }
        .btn-main { background-color: #000; color: #fff; padding: 10px 15px; border: none; cursor: pointer; width: 100%; margin-top: 5px; font-weight: bold; }

        /* Flex Layout Responsive */
        .flex-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
        .flex-col-left { flex: 1; min-width: 250px; }
        .flex-col-right { flex: 2; min-width: 300px; }

        .status-badge { font-weight: bold; text-align: center; padding: 4px; border-radius: 3px; font-size: 10px; display: block; }
        .status-lengkap { background-color: #d4edda; color: #155724; }
        .status-kurang { background-color: #fff3cd; color: #856404; }
        .status-belum-terima { background-color: #f8d7da; color: #721c24; }

        @media screen and (max-width: 600px) {
            .title-main { font-size: 18px !important; }
            .label-meta { width: 80px !important; display: inline-block; }
            .col-aksi { display: none; } /* Sembunyikan aksi di layar super sempit agar hemat ruang */
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="worksheet-container">
    <table class="header-table">
        <tr>
            <td width="50%">
                <div style="text-align: center; font-weight: bold;">DWI BINTANG GLOBAL</div>
                <div style="text-align: center; font-size: 20px; font-style: italic; padding: 10px 0;">STATUS MATERIAL</div>
            </td>
            <td width="50%">
                <div><span class="label-meta">BUYER</span>: <input type="text" id="meta-buyer"></div>
                <div><span class="label-meta">ITEM</span>: <input type="text" id="meta-item"></div>
            </td>
        </tr>
    </table>

    <div class="table-responsive">
        <table id="mainMaterialTable">
            <thead>
                <tr>
                    <th>DESCRIPTION</th>
                    <th>UNIT</th>
                    <th>QTY</th>
                    <th>CONS</th>
                    <th>TOT KEB</th>
                    <th>TERIMA</th>
                    <th>BLC</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="text" name="desc[]" oninput="updateAllCalculations()"></td>
                    <td><input type="text" name="unit[]" value="PCS"></td>
                    <td><input type="number" name="qty[]" oninput="updateAllCalculations()"></td>
                    <td><input type="number" name="cons[]" oninput="updateAllCalculations()"></td>
                    <td><input type="text" name="total_keb[]" readonly></td>
                    <td><input type="number" name="terima[]" readonly></td>
                    <td><input type="text" name="blc[]" readonly></td>
                    <td><span class="status-badge status-belum-terima">BELUM TERIMA</span></td>
                </tr>
            </tbody>
        </table>
    </div>

    <button type="button" class="btn-main" onclick="addNewRow()">+ TAMBAH BARIS</button>
    <button type="button" class="btn-main" style="background-color: #28a745;" onclick="saveData()">💾 SIMPAN KE CLOUD</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyACOluEhfPw4JBlBaHyXtf1k3TIJAHikKo",
        authDomain: "inventory-gudang-16dfe.firebaseapp.com",
        projectId: "inventory-gudang-16dfe",
        storageBucket: "inventory-gudang-16dfe.appspot.com",
        messagingSenderId: "663364522026",
        appId: "1:663364522026:web:f48fb1ba0331695de83353"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function addNewRow() {
        var table = document.querySelector('#mainMaterialTable tbody');
        var newRow = document.createElement('tr');
        newRow.innerHTML = `
            <td><input type="text" name="desc[]"></td>
            <td><input type="text" name="unit[]" value="PCS"></td>
            <td><input type="number" name="qty[]" oninput="updateAllCalculations()"></td>
            <td><input type="number" name="cons[]" oninput="updateAllCalculations()"></td>
            <td><input type="text" name="total_keb[]" readonly></td>
            <td><input type="number" name="terima[]" readonly></td>
            <td><input type="text" name="blc[]" readonly></td>
            <td><span class="status-badge status-belum-terima">BELUM TERIMA</span></td>
        `;
        table.appendChild(newRow);
    }

    function updateAllCalculations() {
        // Logika kalkulasi Anda di sini...
        console.log("Menghitung...");
    }

    function saveData() {
        alert("Menyimpan ke Firebase...");
    }
</script>
</body>
</html>
