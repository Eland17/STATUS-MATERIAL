<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Material</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f0f0; padding: 20px; }
        .db-container { width: 1400px; background-color: #fff; margin: 0 auto; padding: 20px; border: 1px solid #000; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 15px; }
        h2 { margin: 0; font-style: italic; }
        .btn-back { background-color: #000; color: #fff; text-decoration: none; padding: 8px 15px; font-weight: bold; font-size: 12px; border: 1px solid #000; }
        .btn-back:hover { background-color: #444; }
        
        .search-container { margin-bottom: 15px; display: flex; align-items: center; background-color: #fafafa; padding: 10px; border: 1px solid #000; }
        .search-label { font-size: 12px; font-weight: bold; margin-right: 10px; }
        .search-input { flex: 1; padding: 6px 10px; font-size: 12px; border: 1px solid #777; background-color: #fff; outline: none; }
        
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #000; padding: 8px; text-align: left; vertical-align: middle; }
        th { background-color: #fafafa; font-weight: bold; text-align: center; }
        .center { text-align: center; }
        
        .btn-action { padding: 4px 8px; font-size: 11px; cursor: pointer; font-weight: bold; border-radius: 2px; width: 100%; }
        .btn-open { background-color: #0056b3; color: white; border: 1px solid #0056b3; }
        .btn-open:hover { background-color: #004085; }
        .btn-delete { background-color: #dc3545; color: white; border: 1px solid #dc3545; }
        .btn-delete:hover { background-color: #bd2130; }
        
        .status-badge { font-weight: bold; text-align: center; display: block; padding: 3px 6px; border-radius: 3px; font-size: 11px; }
        .status-lengkap { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-belum { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .status-kosong { background-color: #e2e3e5; color: #383d41; border: 1px solid #d6d8db; }
        .empty-message { text-align: center; padding: 30px; font-style: italic; color: #666; }
        .loading-message { text-align: center; padding: 20px; font-weight: bold; color: #0056b3; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="db-container">
    <div class="header-section">
        <h2>📦 ARSIP STATUS MATERIAL</h2>
        <a href="index.html" class="btn-back">⬅️ Input Status Material</a>
    </div>

    <div class="search-container">
        <span class="search-label">🔍 CARI DATA:</span>
        <input type="text" id="searchInput" class="search-input" placeholder="Ketik Nama Buyer, Item, atau Style Number..." onkeyup="filterTable()">
    </div>

    <table id="dbTable">
        <thead>
            <tr>
                <th width="5%">NO</th>
                <th width="15%">KUNCI DOKUMEN</th>
                <th width="20%">BUYER / ITEM</th>
                <th width="12%">STYLE NO</th>
                <th width="12%">STATUS</th>
                <th width="12%">WAKTU SIMPAN</th>
                <th width="12%">AKSI</th>
                <th width="12%">AKSI</th>
            </tr>
        </thead>
        <tbody id="dbList">
            <tr><td colspan="8" class="loading-message">🔄 Menghubungkan ke Cloud...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyACOluEhfPw4JBlBaHyXtf1k3TIJAHikKo",
        authDomain: "inventory-gudang-16dfe.firebaseapp.com",
        projectId: "inventory-gudang-16dfe",
        storageBucket: "inventory-gudang-16dfe.appspot.com",
        messagingSenderId: "663364522026",
        appId: "1:663364522026:web:f48fb1ba0331695de83353"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const namaKoleksi = "TW_Worksheet_Database"; 

    function hitungStatusDokumen(data) {
        if (!data.materials || data.materials.length === 0) return `<span class="status-badge status-kosong">KOSONG</span>`;
        var belumLengkapCount = 0;
        data.materials.forEach(function(mat) {
            var materialName = mat.desc ? mat.desc.trim().toUpperCase() : "";
            var totalTerima = 0;
            if (data.histories && materialName !== "") {
                data.histories.forEach(function(hist) {
                    if ((hist.desc ? hist.desc.trim().toUpperCase() : "") === materialName) totalTerima += parseFloat(hist.qty) || 0;
                });
            }
            var qty = parseFloat(mat.qty) || 0;
            var cons = parseFloat(mat.cons) || 0;
            var lossInput = mat.loss ? mat.loss.toString().trim() : "2%";
            var basisKeb = qty * cons;
            var nilaiLoss = lossInput.includes('%') ? basisKeb * (parseFloat(lossInput.replace('%', '')) / 100) : parseFloat(lossInput) || 0;
            if (totalTerima < (basisKeb + nilaiLoss)) belumLengkapCount++;
        });
        return belumLengkapCount > 0 ? `<span class="status-badge status-belum">❌ BELUM LENGKAP</span>` : `<span class="status-badge status-lengkap">✅ LENGKAP</span>`;
    }

    function loadListFirebase() {
        var tbody = document.getElementById('dbList');
        db.collection(namaKoleksi).orderBy("savedAt", "desc").onSnapshot((snapshot) => {
            tbody.innerHTML = "";
            if (snapshot.empty) {
                tbody.innerHTML = `<tr><td colspan="8" class="empty-message">Belum ada data.</td></tr>`;
                return;
            }
            let index = 0;
            snapshot.forEach((doc) => {
                var data = doc.data();
                var key = doc.id; 
                var tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="center row-no">${index + 1}</td>
                    <td><strong>${key}</strong><br><small>OR: ${data.auth ? data.auth.or : '-'}</small></td>
                    <td class="searchable-buyer-item"><strong>${data.meta ? data.meta.buyer : '-'}</strong><br>${data.meta ? data.meta.item : '-'}</td>
                    <td class="searchable-style">${data.meta ? data.meta.style_no : '-'}</td>
                    <td>${hitungStatusDokumen(data)}</td>
                    <td class="center">${data.savedAt || '-'}</td>
                    <td class="center"><button class="btn-action btn-open" onclick="openDocument('${key}')">📂 Buka</button></td>
                    <td class="center"><button class="btn-action btn-delete" onclick="deleteDocument('${key}')">❌ Hapus</button></td>
                `;
                tbody.appendChild(tr);
                index++;
            });
        });
    }

    function filterTable() {
        var filter = document.getElementById('searchInput').value.toUpperCase();
        var rows = document.getElementById('dbList').getElementsByTagName('tr');
        for (var i = 0; i < rows.length; i++) {
            var text = rows[i].textContent.toUpperCase();
            rows[i].style.display = text.indexOf(filter) > -1 ? "" : "none";
        }
    }

    function openDocument(key) { localStorage.setItem('TW_Load_Target_Key', key); window.location.href = "index.html"; }
    function deleteDocument(key) {
        if (confirm("Hapus data [" + key + "]?")) {
            db.collection(namaKoleksi).doc(key).delete().then(() => alert("Berhasil!")).catch((e) => alert("Error: " + e));
        }
    }

    window.onload = loadListFirebase;
</script>
</body>
</html>
